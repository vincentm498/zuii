<div class="banner banner--slider splide" id="banner-slider-example">
	<div class="splide__track">
		<ul class="splide__list">
			<li class="splide__slide">
				<div class="banner__container container">
					<div class="banner__content">
						<p class="banner__text">
							Discover our latest updates and features. <a href="#" class="banner__link">Learn more &rarr;</a>
						</p>
					</div>
				</div>
			</li>
			<li class="splide__slide">
				<div class="banner__container container">
					<div class="banner__content">
						<p class="banner__text">
							Join our community and start building. <a href="#" class="banner__link">Join now &rarr;</a>
						</p>
					</div>
				</div>
			</li>
			<li class="splide__slide">
				<div class="banner__container container">
					<div class="banner__content">
						<p class="banner__text">
							Get 20% off on your first purchase. <a href="#" class="banner__link">Shop now &rarr;</a>
						</p>
					</div>
				</div>
			</li>
		</ul>
	</div>

	<div class="banner__actions">
		<div class="splide__arrows">
			<button class="splide__arrow splide__arrow--prev" aria-label="Previous slide">
				<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M10 4L6 8L10 12" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
				</svg>
			</button>
			<button class="splide__arrow splide__arrow--next" aria-label="Next slide">
				<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
					<path d="M6 12L10 8L6 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
				</svg>
			</button>
		</div>

		<button class="banner__close" aria-label="Close banner" data-banner-close>
			<svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
				<path d="M15 5L5 15M5 5L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
			</svg>
		</button>
	</div>
</div>
